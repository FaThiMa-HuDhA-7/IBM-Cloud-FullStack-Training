<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login.css">
    <script src="./login.js">   
        </script>

</head>
<body>
    <div style="margin-left: 100px;"
        <h1 style="color: blue;">Login</h1>
        <h3>Please enter your details:</h3>
        Name : <input type="text" class="form-control" id="fullname" placeholder="Enter your name">
        Username : <input type="text" class="form-control" id="username" placeholder="Enter your username">
        Age :<input type="number" class="form-control" id="age" placeholder="Enter your age">
        Email : <input type="email" class="form-control" id="email" placeholder="Enter your email">
        Password : <input type="password" class="form-control" id="password" placeholder="Enter your password">
        
        <button id="myButton" onclick="login()">Login</button>
    </div>
</body>
</html>
